# nginx server block for direct-bot.questlegends.ru
# Place at /etc/nginx/sites-available/direct-bot.questlegends.ru
# Symlink to /etc/nginx/sites-enabled/, then `nginx -t && systemctl reload nginx`.
#
# Stage 1 (HTTP-only): use this file as-is to obtain the cert.
# Stage 2 (after certbot): certbot --nginx will rewrite the file with TLS.

server {
    listen 80;
    listen [::]:80;
    server_name direct-bot.questlegends.ru;

    # Telegram webhook + Mini App API + health
    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 20m;  # for image uploads via Mini App
    }
}
